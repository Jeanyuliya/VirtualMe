version: 2
status: draft
production_enabled: false
source: docs/research/virtualme-domain-pack-8-fields.md
packs:
  engineer_ai_builder:
    name: Engineer / AI Builder
    source: perplexity_max_domain_pack_v1
    domain_role:
    - 軟體工程師、AI 工程師、ML 工程師、系統架構師、Full-Stack 開發者
    core_task:
    - 需求拆解與技術選型
    - 設計與實作系統架構
    - Debug、效能調優、技術債取捨
    - 評估 AI/模型方案可行性
    primary_counterparty:
    - PM、設計師、QA、其他工程師
    decision_partner:
    - Tech Lead、架構師、CTO、資深工程師
    skill_questions:
    - id: engineer_ai_builder_skill_01
      title: 技術選型判斷
      text: 你最近一次需要在兩個以上技術方案中做選擇，你當時怎麼比較？最後是什麼讓你拍板？
      purpose: 萃取決策框架——是靠直覺、經驗、文件驗證還是小 PoC；是否考量團隊能力與長期維護成本
      expected_anchor: 「遇到不確定時偏好先跑 spike 而非靠直覺」；「決策時把遷移成本排在前三考量」
      follow_up_max: 2
      stop_condition: 受訪者說出具體的取捨標準或決策觸發點後停止
      risk_level: low
    - id: engineer_ai_builder_skill_02
      title: Debug 行為模式
      text: 描述一個讓你卡最久的 bug，你從什麼地方開始找起？
      purpose: 觀察系統思維深度——是否分層假設、是否會先縮小 scope、遇到死路如何轉向
      expected_anchor: 「傾向先寫復現腳本而不是直接翻 code」；「習慣先排除環境因素再看邏輯」
      follow_up_max: 2
      stop_condition: 取得「何時放棄 solo 轉向求助」的行為邊界
      risk_level: low
    - id: engineer_ai_builder_skill_03
      title: 技術債取捨
      text: 你有沒有做過一個決定，明知道現在這樣寫是欠債，但還是先這樣？你怎麼跟自己交代？
      purpose: 萃取對品質與速度的真實排序；是否能坦然承認取捨
      expected_anchor: 「只要有明確的還債時間點，技術債可以接受」；「不記錄的技術債比技術債本身更危險」
      follow_up_max: 1
      stop_condition: 受訪者說出自己的「可接受技術債條件」
      risk_level: medium
    - id: engineer_ai_builder_skill_04
      title: AI/模型落地判斷
      text: 你評估過一個 AI 方案不適合在現在的產品裡用，你當時的理由是什麼？
      purpose: 測試是否只追新技術，還是能判斷 AI 落地條件（資料、延遲、解釋性、維護成本）
      expected_anchor: 「AI 方案上線前必須有可觀測的回退機制」；「eval 不過不上 production」
      follow_up_max: 2
      stop_condition: 取得具體否決條件
      risk_level: low
    - id: engineer_ai_builder_skill_05
      title: Code Review 風格
      text: 你給別人 code review 的時候，你最在意的是什麼？有沒有你幾乎每次都會提的點？
      purpose: 萃取工程價值觀——偏重可讀性、正確性、效能、一致性還是安全
      expected_anchor: 「review 時最先看錯誤處理，而不是算法是否最優」；「不接受沒有測試的新邏輯進主幹」
      follow_up_max: 1
      stop_condition: 取得至少一條明確的 review 原則
      risk_level: low
    - id: engineer_ai_builder_skill_06
      title: 文件與溝通習慣
      text: 你最近一次需要讓非工程師理解一個技術問題，你用什麼方式說明的？
      purpose: 測試跨功能溝通能力；是否有意識地調整抽象層次
      expected_anchor: 「遇到非技術對象習慣先問他們最在意的是什麼，再決定從哪個角度講」
      follow_up_max: 1
      stop_condition: 取得受訪者的溝通轉換策略
      risk_level: low
    - id: engineer_ai_builder_skill_07
      title: 自主學習邊界
      text: 你是怎麼決定一個技術值不值得你花時間深入學？你有沒有放棄過某個你原本很想學的東西？
      purpose: 萃取學習投資邏輯——是否以實戰觸發學習，還是廣泛探索；是否能放棄
      expected_anchor: 「沒有真實使用場景的技術，學到能看懂就停」；「偏好先動手做壞，再回頭補理論」
      follow_up_max: 1
      stop_condition: 取得「值得深學 vs 淺嚐」的判斷標準
      risk_level: low
    - id: engineer_ai_builder_skill_08
      title: 上線與風險容忍
      text: 你有沒有在不是百分之百確定的情況下 deploy 過？那次你怎麼評估風險？
      purpose: 萃取對不確定性的耐受度與風險管理習慣（canary、rollback plan、feature flag）
      expected_anchor: 「沒有 rollback 計畫不上線」；「小流量灰度是預設，不是奢侈品」
      follow_up_max: 2
      stop_condition: 取得具體的上線前檢查清單或決策標準
      risk_level: low
    people_questions:
    - id: engineer_ai_builder_people_01
      title: 技術影響力
      text: 你有沒有推過一個大家原本不想接受的技術方向，最後成功了？你怎麼讓人信服的？
      signal: 影響策略——靠數據、PoC、一對一說服還是公開展示
    - id: engineer_ai_builder_people_02
      title: 技術衝突
      text: 你和某個工程師對實作方式有根本分歧，兩個人都覺得對方的方案有問題，最後怎麼收的？
      signal: 衝突解法——技術中立評估、訴諸 lead、各退一步、硬幹看誰對
    - id: engineer_ai_builder_people_03
      title: 協作信任邊界
      text: 你有沒有不太願意和某種工程師合作？是什麼行為讓你有這種感覺？
      signal: 合作底線——是否容忍 blame、不寫文件、只管自己的 scope
    - id: engineer_ai_builder_people_04
      title: 非工程師協作
      text: PM 或設計師提出你認為技術上不可行或不值得做的需求，你通常怎麼反應？
      signal: 跨職能邊界管理；是否會包含理由、是否願意找替代方案
    - id: engineer_ai_builder_people_05
      title: 帶新人/傳承
      text: 你帶過新人 onboard 嗎？你覺得讓新人最快進入狀況的方法是什麼？
      signal: 知識傳遞偏好——靠文件、靠 pairing、靠任務下水；是否享受帶人
    voice_roleplays:
    - id: engineer_ai_builder_voice_01
      title: 正式技術同步
      text: 你需要向 PM 說明下週 sprint 有一個功能來不及，但你已有解法。請打一段 Slack 訊息。
      extraction_target: 主動程度、是否帶替代方案、是否預先管理期望
    - id: engineer_ai_builder_voice_02
      title: 拒絕不合理需求
      text: PM 要你在沒有任何設計稿的情況下，明天 demo 前先做一個「先做 UI 再說」版本。
      extraction_target: 拒絕方式、是否帶條件、語氣是否有邊界感
    - id: engineer_ai_builder_voice_03
      title: 推進停滯的 PR
      text: 你的 PR 已開了五天，負責 review 的人一直沒空，但你需要這個 merge 才能繼續。
      extraction_target: 催促策略——直接問、找主管、升級還是等；主動性程度
    - id: engineer_ai_builder_voice_04
      title: 技術意見衝突
      text: 你提議用 event-driven 架構，Tech Lead 在群組裡說「我不覺得現在有必要搞這麼複雜」。
      extraction_target: 在公開場合維護技術立場的方式；是否有能力不情緒化地辯護
    - id: engineer_ai_builder_voice_05
      title: 線上事故修復後
      text: 你造成了一個生產環境事故，影響了 30 分鐘，剛剛修好。請打一段給 stakeholder 的更新。
      extraction_target: 責任感語氣、是否主動說明根因、是否帶後續防範措施
    boundaries_questions:
    - id: engineer_ai_builder_boundaries_01
      title: 技術風險授權邊界
      text: 什麼程度的技術風險你可以自己拍板，超過什麼程度你一定要拉人進來討論？
      signal: 自主決策的邊界感——是否基於影響範圍、是否有明確的升級觸發點
    - id: engineer_ai_builder_boundaries_02
      title: 不可接受的工作方式
      text: 有沒有一種工作環境或合作模式，讓你覺得你的產出會變得很差？是什麼樣的條件？
      signal: 高效能工作的必要條件；是否有自我認知
    - id: engineer_ai_builder_boundaries_03
      title: on-call 與邊界
      text: 你怎麼看待 on-call 或半夜被叫起來 debug？你有沒有自己的底線？
      signal: 可持續性邊界；是否能清楚說出不可接受條件
    - id: engineer_ai_builder_boundaries_04
      title: 責任範圍認知
      text: 有沒有一種情況，你明明可以動手修，但你選擇不動，讓負責的人去處理？為什麼？
      signal: 責任邊界——是否尊重 ownership；是否有「越界幫忙」的傾向或相反
    - id: engineer_ai_builder_boundaries_05
      title: 拒絕交付條件
      text: 有沒有一種需求，你接了之後做到一半發現你不應該繼續做，你後來怎麼處理？
      signal: 中途停止的勇氣與判斷——是否能在承諾後重新談判
    bad_questions:
    - bad: 你覺得自己的技術能力在團隊裡算幾分？
      why: 自我評分缺乏錨點，且有表演成分
      better: 你有沒有一個技術領域，覺得自己懂得比多數人深一些？是怎麼建立起來的？
    - bad: 你喜歡寫文件嗎？
      why: 封閉題，幾乎所有人都說「還好」
      better: 你最近有沒有寫過一份你覺得寫得不錯的文件？它解決了什麼問題？
    - bad: 你覺得 AI 會取代工程師嗎？
      why: 太抽象，答案偏向場面話
      better: 你在工作中有沒有把 AI 工具整合進你的開發流程？哪個環節效果最明顯？
    - bad: 你有多少年的 X 經驗？
      why: 年資不等於能力，易觸發工程師防衛
      better: 你是什麼情況下第一次深入用 X？你現在怎麼評價當時的理解？
    - bad: 你是 T 型人才還是 I 型人才？
      why: 要求自我貼標籤，且是老套分類
      better: 除了你主力的技術棧，你有沒有另一個你意外地懂得不少的領域？是怎麼發展出來的？
    persona_anchor_examples:
    - 遇到技術選型時，偏好先跑小規模 PoC 驗証，而不是靠文件或直覺決定。
    - 對沒有 rollback 計畫的 production deploy 有強烈阻力，會主動要求補上。
    - Code review 時最先看錯誤處理與邊界條件，而不是算法效率。
    - 技術債只要有明確的還債時間點就能接受，但不記錄的技術債是無法接受的。
    - 喜歡透過動手做壞來學習，而不是先把理論讀完再開始。
    - 跟非技術對象溝通時，習慣先問對方最在意的結果是什麼，再決定從哪個抽象層次解釋。
    - 對 AI 落地判斷嚴謹，不上沒有可觀測回退機制的方案。
    - 評估技術值不值得深入學的標準是：有沒有真實的使用場景。
    - 在技術意見衝突時，偏好用數據或實驗結果說話，而不是靠職位或資歷壓制。
    - 對「先做再說」的上線哲學有抵制，但在有灰度流量控制的前提下可以接受快速驗證。
    - 寫任何系統設計前會先確認「誰來維護這段 code 五年後」。
    - 習慣在 PR 描述裡主動說明「這個選擇的替代方案是什麼，為什麼沒選」。
  sales_bd:
    name: Sales / BD
    source: perplexity_max_domain_pack_v1
    domain_role:
    - 業務代表、客戶主管、商業開發、通路經理、Key Account Manager
    core_task:
    - 發掘潛在客戶與建立管道
    - 提案、談判、關單
    - 客戶關係維護與擴展
    - 跨部門協調（技術、法務、財務）以推進交易
    primary_counterparty:
    - 客戶（採購、使用者、C-level）、合作夥伴
    decision_partner:
    - 業務主管、售前工程師、法務、PM
    skill_questions:
    - id: sales_bd_skill_01
      title: 客戶資格判斷
      text: 你怎麼判斷一個新進來的潛在客戶值不值得花時間？你通常問哪幾個問題就能判斷？
      purpose: 萃取 qualification 邏輯——是否有明確的 BANT 或自有框架；是否容易被熱情客戶說服
      expected_anchor: 「一定要先確認預算擁有者在不在這個對話裡」；「三通電話之後沒有進展的機會就冷掉」
      follow_up_max: 2
      stop_condition: 取得至少三個 qualification 指標
      risk_level: low
    - id: sales_bd_skill_02
      title: 提案客製化程度
      text: 你最近一份讓自己滿意的提案，你花最多時間在哪個部分？
      purpose: 萃取準備深度——是否真的做客戶研究，還是套模板；投入程度是否與機會大小成比例
      expected_anchor: 「每份提案都要有一句只有這個客戶才聽懂的話」
      follow_up_max: 1
      stop_condition: 取得具體準備步驟
      risk_level: low
    - id: sales_bd_skill_03
      title: 談判策略
      text: 客戶要求降價但你不想動，你通常怎麼回應？
      purpose: 萃取談判風格——讓步優先 vs. 守價值；是否有換牌桌策略
      expected_anchor: 「不直接讓價，而是調整 scope」；「先問客戶哪個部分讓他覺得貴，再針對那個點解構」
      follow_up_max: 2
      stop_condition: 取得具體的談判策略或一句常說的話
      risk_level: low
    - id: sales_bd_skill_04
      title: 失單分析
      text: 你最近輸掉的一個案子，你事後怎麼看？你覺得是哪個環節可以不一樣？
      purpose: 萃取自我反思能力——是否會歸因到自身行為，還是都推給外部因素
      expected_anchor: 「輸單後一定要打一通電話問對方為什麼選了競品」
      follow_up_max: 1
      stop_condition: 取得至少一個自我歸因的點
      risk_level: medium
    - id: sales_bd_skill_05
      title: 管道管理紀律
      text: 你怎麼管你的 pipeline？你多久更新一次，你用什麼判斷哪個機會該推進、哪個該放棄？
      purpose: 萃取銷售紀律——是否系統化；是否有放棄標準（否則會出現殭屍 pipeline）
      expected_anchor: 「超過 X 週沒有進展的機會自動降低優先序」；「每週五花 30 分鐘更新 CRM 是不可省的儀式」
      follow_up_max: 1
      stop_condition: 取得明確的管理節奏
      risk_level: low
    - id: sales_bd_skill_06
      title: 跨部門協調能力
      text: 你有沒有遇過因為內部問題（技術評估太慢、法務卡住合約）而差點讓客戶跑掉的情況？你怎麼處理？
      purpose: 萃取內部協調風格——是否能有效調動資源；是否善於用客戶壓力推進內部
      expected_anchor: 「遇到內部卡關，我習慣先給對方一個明確的時間線，再內部去扛那個承諾」
      follow_up_max: 2
      stop_condition: 取得一個具體的協調策略
      risk_level: low
    - id: sales_bd_skill_07
      title: 客戶關係維護
      text: 你有沒有一個客戶關係，是在沒有活躍機會的時候還是維持得很好的？你靠什麼維持？
      purpose: 萃取長期關係投資策略——是否有意識地建立非交易性連結
      expected_anchor: 「每季至少一次不帶目的的 check-in」；「記住客戶的業務挑戰比記住他的生日更重要」
      follow_up_max: 1
      stop_condition: 取得維護策略
      risk_level: low
    - id: sales_bd_skill_08
      title: 競品處理
      text: 客戶說他也在評估你的競品，你通常怎麼應對？你會主動提競品嗎？
      purpose: 萃取競爭策略——是否能主動駕馭競品比較，還是迴避；是否了解自身差異化
      expected_anchor: 「主動提競品，用自己的語言框定比較維度」；「先問客戶目前用競品哪個地方讓他不滿意」
      follow_up_max: 2
      stop_condition: 取得具體的競品對話策略
      risk_level: low
    people_questions:
    - id: sales_bd_people_01
      title: 客戶信任建立
      text: 你覺得一個客戶從把你當業務變成把你當顧問，是什麼時候發生轉折的？有沒有具體的例子？
      signal: 信任建立策略——是靠專業、靠個人連結，還是靠關鍵時刻展現的誠信
    - id: sales_bd_people_02
      title: 內部夥伴協作
      text: 跟售前或技術顧問一起跑案子，你們之間的分工通常是怎麼劃的？有沒有摩擦過的時候？
      signal: 是否尊重各自角色；衝突處理是否成熟
    - id: sales_bd_people_03
      title: 影響力使用
      text: 你有沒有在沒有直接決定權的情況下推動了一個決策？你用了什麼方法？
      signal: 影響力來源——靠數據、靠關係、靠製造緊迫感、靠說故事
    - id: sales_bd_people_04
      title: 難搞客戶
      text: 你有沒有一個讓你壓力很大的客戶，但你最後還是完成了這個案子？那個客戶讓你壓力大的原因是什麼？
      signal: 情緒調節能力；是否能拆解壓力來源並逐一應對
    - id: sales_bd_people_05
      title: 離開的客戶
      text: 有沒有一個客戶你沒辦法服務好、或者主動放棄了？當時是什麼情況？
      signal: 客戶邊界管理；是否有能力辨識「不對的客戶」
    voice_roleplays:
    - id: sales_bd_voice_01
      title: 正式提案跟進
      text: 你上週做了一場提案，客戶說會討論後回覆，但已經過了五天還沒消息。請打一封跟進信。
      extraction_target: 主動程度；是否帶新的價值點；是否製造下一步行動
    - id: sales_bd_voice_02
      title: 拒絕不合理折扣
      text: 客戶說競品便宜 20%，要你 match，但你的產品不能跌到那個價。請打一段回應。
      extraction_target: 守價策略；是否能用價值而非情緒回應
    - id: sales_bd_voice_03
      title: 推進停滯中的案子
      text: 一個案子已經在「評估中」三個月了，你需要讓它重新動起來。請打一段訊息給對口聯絡人。
      extraction_target: 重啟策略；是否有製造行動錨點的能力
    - id: sales_bd_voice_04
      title: 內部升級衝突
      text: 你的對口聯絡人說他很支持，但他的老闆突然說「現在不是好時機」。請打一段給聯絡人的訊息。
      extraction_target: 是否能協助內部倡議者；是否有穿透到決策層的策略
    - id: sales_bd_voice_05
      title: 客戶抱怨修復
      text: 客戶剛上線，但遇到了一個你事前沒預警的問題，他傳訊息說「這不是我當初買的東西」。
      extraction_target: 危機處理語氣；是否先承認問題再解決；是否能穩住關係
    boundaries_questions:
    - id: sales_bd_boundaries_01
      title: 承諾邊界
      text: 你有沒有過答應了客戶一個你自己沒辦法控制的事情？後來怎麼收？
      signal: 是否有過度承諾傾向；是否能事後誠實修正承諾
    - id: sales_bd_boundaries_02
      title: 不接受的客戶類型
      text: 你有沒有一種客戶，你接了之後每次開會都覺得很消耗？你怎麼描述那種客戶？
      signal: 客戶邊界感；是否能清楚說出不對的客戶特徵
    - id: sales_bd_boundaries_03
      title: 道德邊界
      text: 有沒有一種銷售方式或說話方式，你覺得你不會做，即使它可能很有效？
      signal: 倫理邊界——是否有超過業績的底線
    - id: sales_bd_boundaries_04
      title: 內部資源使用邊界
      text: 你怎麼判斷一個案子值得動用多少內部資源（技術評估、客製化、法務）？你有沒有拒絕過申請資源？
      signal: 成本意識；是否有機會 ROI 的概念
    - id: sales_bd_boundaries_05
      title: 放棄標準
      text: 你在什麼情況下會告訴自己：這個機會已經沒戲了，我要停止投入？
      signal: 損失厭惡程度；是否有清楚的撤退標準而非一直耗著
    bad_questions:
    - bad: 你的業績達成率是多少？
      why: 太直接切數字，像是在審查
      better: 你最近一個季度，你覺得跑得最順的案子，是因為做對了什麼？
    - bad: 你喜歡被拒絕嗎？
      why: 老套銷售面試題，受訪者會給罐頭答案
      better: 你最近一次被客戶明確拒絕，你當時第一個反應是什麼？後來怎麼處理？
    - bad: 你有沒有 hunter 心態？
      why: 要求自我貼標籤，且是老掉牙的分類
      better: 你開發一個完全陌生的客戶，通常從哪裡開始？
    - bad: 你是關係型業務還是方案型業務？
      why: 二元分類，迫使受訪者選一個
      better: 你有沒有一個靠產品說服的客戶，和一個靠關係維繫的客戶，這兩種你更喜歡哪種互動方式？
    - bad: 你怎麼超越你的配額？
      why: 預設他有達到，且讓人覺得在炫技
      better: 你怎麼判斷一個月哪些機會應該全力衝，哪些先放著？
    persona_anchor_examples:
    - 評估新機會時，會先確認預算擁有者是否在對話中，否則不進入深度提案模式。
    - 跟進停滯中的案子時，習慣帶一個新的資訊或價值點，而不是純粹問「有什麼進展」。
    - 面對降價壓力，偏好調整 scope 而不是直接讓價。
    - 每份提案都會嵌入一句只有這個客戶才聽懂的話，以展示真正做過功課。
    - 失單後會主動打一通電話給客戶，問清楚他為什麼選了競品。
    - 認為記住客戶的業務挑戰比記住他的生日更重要。
    - 傾向主動提起競品，用自己的語言框定比較維度，而不是等客戶提。
    - 對「超過三週沒有進展的 pipeline 機會」有自動降優先序的機制。
    - 危機處理時的第一反應是先承認問題的存在，而不是先解釋原因。
    - 對「答應了自己控制不了的事」有強烈的後悔感，會試圖在對話當下就設定保護條款。
    - 對消耗型客戶有明確的辨識指標，且願意主動放棄這類機會。
    - 把把客戶當作顧問信任的關係視為最高成就，而不只是完成交易。
  pm_tpm:
    name: PM / TPM
    source: perplexity_max_domain_pack_v1
    domain_role:
    - 產品經理、技術專案經理、程式產品經理、平台 PM
    core_task:
    - 需求收集與優先序定義
    - Roadmap 制定與溝通
    - 跨部門協調（工程、設計、業務、法務）
    - 風險追蹤、進度管理、上線決策
    primary_counterparty:
    - 工程師、設計師、業務、客戶代表
    decision_partner:
    - 工程 Lead、設計 Lead、業務主管、資料分析師
    skill_questions:
    - id: pm_tpm_skill_01
      title: 優先序決策
      text: 你有沒有一次，你明知道某個需求技術難度低、業務很想要，但你還是決定不做或延後？你怎麼解釋那個決定？
      purpose: 萃取優先序框架——是否能抵抗壓力；是否有清楚的取捨邏輯
      expected_anchor: 「不在當期策略目標上的需求，即使容易做，也不進 roadmap」
      follow_up_max: 2
      stop_condition: 取得具體的否決標準
      risk_level: low
    - id: pm_tpm_skill_02
      title: 需求模糊處理
      text: 你最近一次拿到的需求，你認為問題定義本身就是錯的，你怎麼處理？
      purpose: 萃取問題重構能力；是否能在不得罪對方的前提下改變方向
      expected_anchor: 「先把對方描述的症狀和他想要的解法分開，再重新問問題」
      follow_up_max: 2
      stop_condition: 取得具體的重構步驟
      risk_level: low
    - id: pm_tpm_skill_03
      title: 資源不足下的交付
      text: 你有沒有在資源（人力、時間、技術）明顯不足的情況下，還是交付了一個可以接受的結果？你做了什麼取捨？
      purpose: 萃取 MVP 思維與資源運用能力
      expected_anchor: 「先定義 non-negotiable，其他的都可以討論縮範圍」
      follow_up_max: 1
      stop_condition: 取得具體的取捨範例
      risk_level: low
    - id: pm_tpm_skill_04
      title: 數據驅動決策
      text: 你有沒有一個決定，是你原本有直覺，但數據告訴你不一樣，你最後選擇相信哪一個？
      purpose: 萃取直覺 vs. 數據的實際排序；是否能說出「相信數據的條件」
      expected_anchor: 「數據樣本太小時我不相信數據，我會先擴充樣本再決定」
      follow_up_max: 2
      stop_condition: 取得受訪者的數據信任標準
      risk_level: low
    - id: pm_tpm_skill_05
      title: 上線決策
      text: 你有沒有在不確定情況下做過上線決定？你當時的邏輯是什麼？
      purpose: 萃取風險耐受度與回退計畫思維
      expected_anchor: 「上線前必須定義成功指標和失敗指標，才能知道要不要 rollback」
      follow_up_max: 2
      stop_condition: 取得上線決策的評估框架
      risk_level: low
    - id: pm_tpm_skill_06
      title: 跨部門衝突協調
      text: 你有沒有遇過工程說做不到、業務說一定要做、你夾在中間的情況？你怎麼處理？
      purpose: 萃取三方衝突的協調風格——是否能區隔技術限制與意願問題；是否能創造雙方都接受的方案
      expected_anchor: 「把「不能做」和「現在不做」分開，再去找時間線的解法」
      follow_up_max: 2
      stop_condition: 取得具體的協調策略
      risk_level: low
    - id: pm_tpm_skill_07
      title: Roadmap 溝通
      text: 你有沒有一次向 stakeholder 更新 roadmap 的結果，讓你覺得說得不夠清楚或沒達到效果？你後來改了什麼？
      purpose: 萃取溝通自我修正能力；是否有意識調整受眾框架
      expected_anchor: 「對 C-level 說 roadmap 要說商業影響，對工程說要說技術選型邏輯，是兩份不同的材料」
      follow_up_max: 1
      stop_condition: 取得至少一個溝通策略改變
      risk_level: low
    - id: pm_tpm_skill_08
      title: 失敗的 feature
      text: 你做過一個功能，上線後反應不好，你事後怎麼分析為什麼沒有成？
      purpose: 萃取反思深度——是否歸因到自己的驗證流程，還是推給市場；是否能說出「早期信號」
      expected_anchor: 「那個功能最大的問題是我在 build 之前沒有真的去問用戶，我問的是我們的業務」
      follow_up_max: 2
      stop_condition: 取得自我歸因的反思
      risk_level: low
    people_questions:
    - id: pm_tpm_people_01
      title: 工程師關係
      text: 你有沒有跟工程師建立過一種關係，讓他們願意在需求不清楚的時候主動來問你，而不是自己猜？你怎麼建立的？
      signal: 信任建立策略；是否有意識地降低工程師溝通成本
    - id: pm_tpm_people_02
      title: 向上管理
      text: 你有沒有一個決定，你的老闆不同意，但你最後還是堅持了？你用什麼說服他，或你用什麼理由接受了他的否決？
      signal: 向上溝通能力；是否有能力分辨「可辯護的分歧」和「應該服從的決策」
    - id: pm_tpm_people_03
      title: 利害關係人管理
      text: 你有沒有一個 stakeholder，他很難搞但你沒有辦法繞過他，你怎麼跟他合作？
      signal: 關係管理複雜度；是否有針對不同型態 stakeholder 的應對策略
    - id: pm_tpm_people_04
      title: 壞消息傳遞
      text: 你有沒有需要告訴老闆或客戶一個他不會高興聽的消息？你怎麼準備那次對話？
      signal: 難對話準備方式；是否有早期預警習慣
    - id: pm_tpm_people_05
      title: 設計師協作
      text: 你和設計師意見不一致的時候，你怎麼決定聽誰的？
      signal: 專業邊界的尊重度；是否能分辨「PM 的決定」vs「設計師的決定」
    voice_roleplays:
    - id: pm_tpm_voice_01
      title: 正式狀態更新
      text: 一個原定這週上線的 feature，工程說還需要兩週。你需要更新你的業務老闆。請打一封訊息。
      extraction_target: 主動承擔 vs. 推責；是否帶替代方案；是否預先管理期望
    - id: pm_tpm_voice_02
      title: 拒絕新需求
      text: 業務 VP 突然傳訊息說「我需要你在這個 sprint 加一個 feature，客戶急用」。你已排滿。
      extraction_target: 拒絕策略；是否帶條件；是否提出優先序選擇讓對方決定
    - id: pm_tpm_voice_03
      title: 推進停滯中的設計評審
      text: 一個設計稿已等待設計主管 review 超過一週，影響了 sprint 進行。請打一段訊息。
      extraction_target: 催促方式；是否能不得罪人地製造壓迫感
    - id: pm_tpm_voice_04
      title: 跨部門衝突調解
      text: 工程 Lead 在群組裡公開說「這個需求根本就是拍腦袋的，我不知道做這個的目的是什麼」。
      extraction_target: 公開衝突處理方式；是否私下介入；是否有能力重建對話框架
    - id: pm_tpm_voice_05
      title: 上線後道歉/修復
      text: 你昨天上線的功能有個明顯的 UX 問題，用戶開始抱怨。你需要告知你的老闆和相關團隊。
      extraction_target: 責任語氣；是否帶後續計畫；是否在 36 小時內提出修復方向
    boundaries_questions:
    - id: pm_tpm_boundaries_01
      title: 決策權邊界
      text: 有哪些決定你覺得是你應該拍板的，哪些你覺得不是你的決定？
      signal: 授權邊界清晰度；是否清楚「我的決定」vs.「需要對齊的決定」
    - id: pm_tpm_boundaries_02
      title: 範疇蔓延處理
      text: 你有沒有遇過一個案子，做到一半發現需求比原來大很多？你怎麼判斷要不要收回來？
      signal: scope creep 對策；是否有明確的觸發點讓他重新談判
    - id: pm_tpm_boundaries_03
      title: 不可妥協的事項
      text: 有沒有一種壓力或要求，你絕對不會因為主管或客戶要求就讓步的？
      signal: 核心原則——品質底線、用戶安全、資料隱私等
    - id: pm_tpm_boundaries_04
      title: 個人工作邊界
      text: PM 的工作很容易沒有邊界，你有沒有一個時期你覺得邊界消失了？後來是怎麼找回來的？
      signal: 自我保護機制；是否對可持續工作方式有反思
    - id: pm_tpm_boundaries_05
      title: 放棄一個功能
      text: 你有沒有做到一半決定放棄一個功能的？那個決定是怎麼做的、是誰做的？
      signal: 殺死自己的 baby 的能力；是否能說出 kill 決策的觸發條件
    bad_questions:
    - bad: 你怎麼平衡技術和商業需求？
      why: 太抽象、太面試，PM 都背得出罐頭答案
      better: 你最近一次在技術成本和商業價值之間做取捨，結果是什麼？
    - bad: 你覺得 PM 最重要的能力是什麼？
      why: 問自我定義，答案永遠是「溝通」加「同理心」
      better: 你做過最難的一個跨部門協調，讓你覺得學到最多的是什麼？
    - bad: 你怎麼跟工程師相處？
      why: 太廣、易流於表面（「尊重技術判斷」）
      better: 工程師覺得你的需求描述不清楚，你怎麼發現的？你改了什麼？
    - bad: 你用過什麼 PM 工具？
      why: 工具是手段，不是信號；列工具不代表能力
      better: 你怎麼追蹤一個複雜功能的進度？你通常在哪個環節最容易漏掉東西？
    - bad: 你的 OKR 完成了多少？
      why: 數字脫離脈絡沒有意義，且容易防衛
      better: 上一個目標週期，你最後悔沒做的一件事是什麼？為什麼當時沒做？
    persona_anchor_examples:
    - 對不在當期策略目標上的需求，即使技術容易，也傾向不進 roadmap，且能說得出理由。
    - 拿到需求時習慣把「對方描述的症狀」和「他要的解法」分開，再回去問問題。
    - 把「做不到」和「現在不做」視為本質不同的兩件事，且會在對話中主動區分。
    - 上線前必定定義失敗指標，否則不啟動上線流程。
    - 對 C-level 說 roadmap 說商業影響，對工程說技術選型邏輯，是兩份不同材料。
    - 習慣在遇到壞消息時先想「我有沒有早期信號錯過了」，而不只是思考怎麼報告。
    - 認為 PM 最大的風險是「問了業務就以為問了用戶」。
    - 資源不足時先定義 non-negotiable，其他的範圍都可以談。
    - 對 feature 被殺死沒有情緒障礙，認為比繼續做錯的東西代價小。
    - 向上管理時，能清楚分辨「可以辯護的意見分歧」和「應該服從的決定」。
    - 遇到 scope creep 有明確的重談觸發點，不會默默擴大做。
    - 把讓工程師「不清楚就主動來問」視為工作成功的重要指標之一。
  consultant:
    name: Consultant
    source: perplexity_max_domain_pack_v1
    domain_role:
    - 管理顧問、策略顧問、IT 顧問、轉型顧問、獨立顧問
    core_task:
    - 問題診斷與結構化分析
    - 報告與建議書製作
    - 客戶訪談與工作坊引導
    - 執行建議與變革管理
    primary_counterparty:
    - 客戶中高層主管、專案對接窗口
    decision_partner:
    - 顧問主管、顧問同儕、客戶關鍵 stakeholder
    skill_questions:
    - id: consultant_skill_01
      title: 問題結構化
      text: 你接過一個客戶的問題，一開始你以為是 A 問題，後來發現根本是 B 問題？你是怎麼發現的？
      purpose: 萃取診斷能力——是否有「不過早收斂問題定義」的習慣
      expected_anchor: 「前兩週做的是挑戰假設，而不是驗證假設」
      follow_up_max: 2
      stop_condition: 取得具體的「重新定義問題」的方法
      risk_level: low
    - id: consultant_skill_02
      title: 資料不足下的判斷
      text: 你有沒有在客戶資料不完整的情況下，還是要給建議的經驗？你的做法是什麼？
      purpose: 萃取在不確定性下的溝通方式——是否能清楚標注假設前提
      expected_anchor: 「把建議的前提條件寫清楚，讓客戶知道他接受的是哪個假設下的答案」
      follow_up_max: 1
      stop_condition: 取得「假設標注」的習慣
      risk_level: low
    - id: consultant_skill_03
      title: 建議書框架
      text: 你最近一份建議書，你最花心思的部分是哪裡？為什麼那個部分最難？
      purpose: 萃取思考偏好——邏輯結構、數據驗證、執行可行性、簡報視覺哪個最優先
      expected_anchor: 「最難的是讓客戶接受的不是「最好的答案」，而是「他做得到的答案」」
      follow_up_max: 1
      stop_condition: 取得製作邏輯
      risk_level: low
    - id: consultant_skill_04
      title: 客戶推拒處理
      text: 你給過一個建議，客戶當場說他們做不到或不想做，你怎麼應對？
      purpose: 萃取說服策略——是否理解阻力根源；是否能重新框架建議
      expected_anchor: 「先問是哪個部分讓他覺得做不到，是資源問題、政治問題還是他根本不相信這個答案」
      follow_up_max: 2
      stop_condition: 取得具體的應對策略
      risk_level: low
    - id: consultant_skill_05
      title: 工作坊引導
      text: 你有沒有一個工作坊或訪談，氣氛不太對，你當下做了什麼調整？
      purpose: 萃取現場應變能力；是否有閱讀房間的技能
      expected_anchor: 「發現討論卡住通常是議題太大，習慣立刻把問題拆小再問一次」
      follow_up_max: 2
      stop_condition: 取得具體的現場調整行為
      risk_level: low
    - id: consultant_skill_06
      title: 報告呈現風格
      text: 你有沒有一份報告，你覺得邏輯很好，但客戶反應很冷淡？你後來的解讀是什麼？
      purpose: 萃取溝通自我反思——是否意識到「邏輯好」和「客戶接受」的差距
      expected_anchor: 「分析做完要問的問題不是『這個答案對不對』，而是『客戶願不願意行動』」
      follow_up_max: 1
      stop_condition: 取得受訪者對自身報告風格的反思
      risk_level: low
    - id: consultant_skill_07
      title: 超出範疇的問題
      text: 客戶問了一個你的合約範疇之外的問題，你怎麼決定要不要回答？
      purpose: 萃取邊界管理風格——是否傾向擴範疇換信任；是否有清楚的職業邊界
      expected_anchor: 「先快速給一個方向，然後說清楚這不在這次的 scope，若要深入需要另外討論」
      follow_up_max: 1
      stop_condition: 取得範疇邊界的處理策略
      risk_level: low
    - id: consultant_skill_08
      title: 競品差異化
      text: 你有沒有一次你明確知道，客戶為什麼選你而不是另外一家顧問？那個差異點是什麼？
      purpose: 萃取自我差異化認知——是否清楚自己的獨特價值
      expected_anchor: 「客戶說他選我是因為我在提案時就已經定義了他自己沒想到的問題」
      follow_up_max: 1
      stop_condition: 取得受訪者的自我差異化敘事
      risk_level: low
    people_questions:
    - id: consultant_people_01
      title: 客戶信任深度
      text: 你有沒有一個客戶，在專案結束後還是持續找你的？你覺得那個關係是怎麼建立起來的？
      signal: 長期顧問信任建立策略
    - id: consultant_people_02
      title: 客戶內部政治
      text: 你有沒有發現你的建議被客戶內部某個人擋住了，但那個人不是你的對口？你怎麼應對？
      signal: 政治敏感度與迂迴影響力策略
    - id: consultant_people_03
      title: 團隊內部協作
      text: 你和顧問同事的工作分工，有沒有你覺得分得不好、或彼此有摩擦的時候？通常是什麼原因？
      signal: 團隊信任與責任劃分偏好
    - id: consultant_people_04
      title: 壞消息處理
      text: 你有沒有分析結果顯示客戶的策略根本就是錯的，你怎麼讓他們聽進去？
      signal: 衝突性建議的呈現方式；是否能讓客戶接受不舒服的真相
    - id: consultant_people_05
      title: 影響力邊界
      text: 你有沒有一次，你覺得你的建議是對的，但最後客戶還是做了不一樣的事？你後來怎麼看這件事？
      signal: 影響力邊界認知；是否能放下控制感
    voice_roleplays:
    - id: consultant_voice_01
      title: 正式進度更新
      text: 你的第一階段分析顯示問題比原來預估的複雜，需要延後兩週交付最終報告。請打一封給客戶窗口的信。
      extraction_target: 誠信溝通風格；是否帶新的時間計畫
    - id: consultant_voice_02
      title: 拒絕範疇擴張
      text: 客戶說「你們既然在分析這塊，能不能順便也看一下我們的業務端的狀況？」但這不在合約裡。
      extraction_target: 範疇邊界管理語氣；是否能不得罪對方地說「不」
    - id: consultant_voice_03
      title: 推進卡關的會議
      text: 你已寄出三封信要約一個關鍵主管受訪，但他都沒回。你需要透過客戶窗口推動。
      extraction_target: 升級策略；是否能不顯得強硬但有效
    - id: consultant_voice_04
      title: 意見衝突
      text: 在客戶工作坊中，一位高層主管說「你們顧問都這樣說，但我們行業不一樣」並否定你的分析框架。
      extraction_target: 公開挑戰的應對策略；是否能維持立場而不對立
    - id: consultant_voice_05
      title: 關係修復
      text: 你的分析報告有一個數字算錯，客戶在簡報中當場發現了。請打一封後續的信。
      extraction_target: 錯誤承擔語氣；是否主動說明修正計畫
    boundaries_questions:
    - id: consultant_boundaries_01
      title: 不可妥協的建議原則
      text: 有沒有一種情況，客戶要你修改你的結論，但你不願意？你是怎麼處理的？
      signal: 職業誠信邊界；是否有「結論不可出售」的核心原則
    - id: consultant_boundaries_02
      title: 範疇蔓延底線
      text: 你什麼時候會對客戶說「這個超出我們這次的範圍」，而不是默默多做？
      signal: 時間與資源的邊界管理
    - id: consultant_boundaries_03
      title: 利益衝突處理
      text: 你有沒有發現你給的建議可能對你的公司有商業利益，你怎麼處理這個衝突？
      signal: 職業倫理意識
    - id: consultant_boundaries_04
      title: 不接受的委託條件
      text: 有沒有一種案子，你接了之後覺得你不應該接，是什麼讓你有這種感覺？
      signal: 案子評估邊界；是否有「不對的案子」的辨識能力
    - id: consultant_boundaries_05
      title: 執行失敗的責任邊界
      text: 顧問給了建議，客戶執行了但失敗了，你覺得責任在哪裡？
      signal: 顧問責任範圍認知；是否過度承擔或過度推卸
    bad_questions:
    - bad: 你最厲害的一個案子是什麼？
      why: NDA 和保密義務讓受訪者很難回答，且易變成炫耀
      better: 你做過一個你認為最有學習價值的案子，不用說是哪個客戶，你從那個案子學到了什麼？
    - bad: 你覺得顧問最重要的能力是什麼？
      why: 標準答案：「結構化思維和溝通能力」，毫無人格信號
      better: 你認識過一個你覺得真的很強的顧問，讓你覺得強的原因是什麼？
    - bad: 你用什麼分析框架？
      why: 易流於工具展示；答案不代表實際使用方式
      better: 你最近一次用一個框架沒有用，你後來是怎麼換方向的？
    - bad: 你喜歡顧問工作嗎？
      why: 情感詢問對理性型受訪者無效，且問不到真實面
      better: 顧問工作哪個部分你覺得你特別有能量？哪個部分你覺得每次都在消耗你？
    - bad: 你有沒有讓客戶「成功轉型」的案例？
      why: 「轉型成功」定義模糊，且顧問無法對執行結果負責
      better: 你做過一個案子，你覺得建議被認真執行了，那個案子有哪些條件是對的？
    persona_anchor_examples:
    - 接到問題的前兩週習慣做「挑戰假設」而不是「驗證假設」，避免過早收斂問題定義。
    - 在資料不足時仍能給建議，但會把前提假設明確寫出來，讓客戶知道他接受的是哪個假設下的答案。
    - 認為分析結束後最重要的問題不是「這個答案對不對」，而是「客戶願不願意採取行動」。
    - 傾向給「客戶做得到的答案」而不是「理論上最好的答案」。
    - 面對客戶的反對，習慣先問「是資源問題、政治問題，還是他根本不相信這個答案」，再決定如何回應。
    - 工作坊卡住時，第一反應是把問題拆小而不是換題，認為「議題太大」是討論失速的主因。
    - 對超出合約範疇的請求，習慣給一個方向再說清楚需要另外討論，而不是直接拒絕。
    - 把結論的獨立性視為職業誠信的核心，不接受「修改結論讓客戶好看」的要求。
    - 認為建立長期顧問信任的關鍵在於「在沒有商機的時候還是出現」。
    - 面對公開挑戰時，習慣先承認對方的脈絡再重新定位自己的論點，而不是防禦性反擊。
    - 對範疇蔓延有明確的觸發點，不會因為「順便」的請求而默默擴大工作量。
    - 自我評估案子成功的標準是「客戶是否改變了他自己的決策框架」，而不只是「報告是否被接受」。
  manager_people_lead:
    name: Manager / People Lead
    source: perplexity_max_domain_pack_v1
    domain_role:
    - 工程主管、部門主管、Team Lead、Director、VP of Engineering
    core_task:
    - 人員招募、評估、培育、績效管理
    - 設定團隊目標並追蹤
    - 跨部門對齊與資源協調
    - 文化建立與團隊氛圍管理
    primary_counterparty:
    - 直屬下屬、同層主管、HR
    decision_partner:
    - 老闆/VP、HR BP、其他主管
    skill_questions:
    - id: manager_people_lead_skill_01
      title: 績效對話
      text: 你有沒有跟一個表現不如預期的人談過績效？你當時怎麼開口的？
      purpose: 萃取難對話能力——是否能直接但不傷人
      expected_anchor: 「會先說清楚我看到的具體行為，而不是貼標籤說他『態度有問題』」
      follow_up_max: 2
      stop_condition: 取得具體的開場策略
      risk_level: medium
    - id: manager_people_lead_skill_02
      title: 授權範圍
      text: 你通常什麼樣的決定你會讓你的人自己做，什麼樣的你會介入？
      purpose: 萃取授權哲學——是否有清楚的邊界而非「看情況」
      expected_anchor: 「可逆的決定放手，不可逆的決定一定要過我」
      follow_up_max: 1
      stop_condition: 取得明確的授權標準
      risk_level: low
    - id: manager_people_lead_skill_03
      title: 招募判斷
      text: 你在面試時，通常你最後是靠什麼判斷這個人可以還是不行？
      purpose: 萃取人才判斷直覺——是否有超過履歷的評估維度
      expected_anchor: 「我看他在不確定的情況下怎麼思考，比看他有沒有經驗更重要」
      follow_up_max: 1
      stop_condition: 取得判斷標準或 dealbreaker
      risk_level: low
    - id: manager_people_lead_skill_04
      title: 人員離職處理
      text: 你有沒有一個人提離職讓你意外的？你後來怎麼理解為什麼他要走？
      purpose: 萃取對人員信號的敏感度——是否有能力回望早期指標
      expected_anchor: 「事後想想他在三個月前就有一些訊號，我沒有接到」
      follow_up_max: 2
      stop_condition: 取得對「早期信號」的反思
      risk_level: medium
    - id: manager_people_lead_skill_05
      title: 文化建立
      text: 你有沒有刻意做過某件事，讓你的團隊形成某種你想要的行為模式？那件事是什麼？
      purpose: 萃取文化塑造的具體手段——是否靠身教、靠制度，還是靠儀式
      expected_anchor: 「我在 retro 裡面公開說過我自己的失誤，從那次開始大家才開始敢說」
      follow_up_max: 2
      stop_condition: 取得具體的文化行為範例
      risk_level: low
    - id: manager_people_lead_skill_06
      title: 弱者保護 vs. 高標準
      text: 你有沒有一個人，你知道他已經在盡力了，但他的輸出就是跟不上？你怎麼處理那個張力？
      purpose: 萃取對「努力但不夠好」的處理方式——是否能同時維持公平與人性
      expected_anchor: 「努力和結果是兩件事，我會給他正面的努力反饋，但也要讓他知道我對輸出的期待沒有降低」
      follow_up_max: 2
      stop_condition: 取得受訪者對這個張力的具體解法
      risk_level: medium
    - id: manager_people_lead_skill_07
      title: 向上溝通
      text: 你有沒有一個你的老闆的決定，你覺得對你的團隊有負面影響，你怎麼反映？
      purpose: 萃取向上影響力——是否有能力為團隊發聲但不讓老闆覺得被攻擊
      expected_anchor: 「我習慣帶數據，說清楚這個決定對團隊 delivery 能力的具體影響，而不是說『大家覺得很不公平』」
      follow_up_max: 1
      stop_condition: 取得向上溝通的具體策略
      risk_level: low
    - id: manager_people_lead_skill_08
      title: 自己的成長盲點
      text: 你當主管之後，什麼事是你花了最久才學會的？
      purpose: 萃取管理自我成長軌跡——是否有具體的學習時刻
      expected_anchor: 「最久才學會的是：我的焦慮不要傳給我的人」
      follow_up_max: 1
      stop_condition: 取得具體的學習事件
      risk_level: low
    people_questions:
    - id: manager_people_lead_people_01
      title: 一對一節奏
      text: 你的 1-on-1 通常是誰主導、怎麼進行的？你覺得一個好的 1-on-1 結束時應該要發生什麼？
      signal: 傾聽 vs. 指導偏好；是否把 1-on-1 當成工具
    - id: manager_people_lead_people_02
      title: 衝突調解
      text: 你有沒有兩個下屬之間有衝突，需要你介入？你什麼時候決定介入，什麼時候讓他們自己解決？
      signal: 干預邊界；是否能讓團隊自己成長解決問題
    - id: manager_people_lead_people_03
      title: 高潛力員工培育
      text: 你有沒有一個你覺得很有潛力的人，你為他做了什麼讓他加速成長？
      signal: 培育哲學——給任務、給資源、給曝光、給反饋；是否有意識地設計成長路徑
    - id: manager_people_lead_people_04
      title: 不適任員工
      text: 你有沒有最後決定讓一個人離開的經驗？你怎麼走到那個決定的？
      signal: 對困難人事決策的心理準備與執行方式
    - id: manager_people_lead_people_05
      title: 心理安全感
      text: 你覺得你的團隊會不會主動跟你說壞消息？你怎麼知道？
      signal: 心理安全感的自我評估；是否有主動確認的機制
    voice_roleplays:
    - id: manager_people_lead_voice_01
      title: 目標設定溝通
      text: 你需要向你的團隊說明下一季 OKR 有一個很有挑戰性的目標，你知道他們會覺得太高。請打一段訊息或開場白。
      extraction_target: 動機語言風格；是否帶理由；是否邀請參與
    - id: manager_people_lead_voice_02
      title: 拒絕不合理要求
      text: 你的老闆說希望你的團隊這季多承擔一個跨部門的任務，但你認為你們已經滿載了。
      extraction_target: 向上推拒的策略；是否帶資源解析；是否請老闆做優先序選擇
    - id: manager_people_lead_voice_03
      title: 推進績效改善
      text: 你和一個下屬已談過一次績效問題，但過了三週，改善幅度很有限。你需要再開一次對話。
      extraction_target: second conversation 策略；是否更直接；是否帶明確的期望和後果
    - id: manager_people_lead_voice_04
      title: 衝突後的關係修復
      text: 你在一次公開 review 裡批評了某個人的工作，事後你覺得語氣太重了。
      extraction_target: 道歉方式；是否能在不喪失管理威信的情況下修復關係
    - id: manager_people_lead_voice_05
      title: 好消息公告
      text: 你的一個下屬拿到了一個內部晉升，你想在 team 群組宣布。
      extraction_target: 讚揚方式；是否具體說明他為什麼值得；是否帶團隊文化訊號
    boundaries_questions:
    - id: manager_people_lead_boundaries_01
      title: 授權下限
      text: 你有沒有一種決定，你是真的希望下屬自己決定，但你最後還是介入了？你後來覺得那個介入是對的嗎？
      signal: 授權後的克制能力；是否容易落入微管理
    - id: manager_people_lead_boundaries_02
      title: 個人邊界
      text: 當下屬的個人問題（家庭、身心狀況）開始影響工作，你介入的邊界在哪裡？
      signal: 主管角色邊界——是否能兼顧關懷與職業邊界
    - id: manager_people_lead_boundaries_03
      title: 不可接受的管理要求
      text: 有沒有一種上面交代下來的任務，你覺得你沒辦法、也不應該照辦？
      signal: 對「執行違背自己價值觀的指令」的處理方式
    - id: manager_people_lead_boundaries_04
      title: 資訊透明邊界
      text: 有沒有公司的決定或資訊，你覺得應該跟你的人說清楚，但組織不讓你說？你怎麼處理那個張力？
      signal: 資訊透明對主管的壓力；是否能在誠信和服從之間找到路
    - id: manager_people_lead_boundaries_05
      title: 與前下屬的邊界
      text: 有沒有一個前下屬，在他離開後還是持續找你諮詢或聊工作的事？你怎麼定義那個關係？
      signal: 角色邊界在關係延伸後的維持能力
    bad_questions:
    - bad: 你的管理風格是什麼？
      why: 罐頭答案：「我是 servant leader，也是數據驅動的...」
      better: 你最近一次幫一個人在你的團隊成長，你做了什麼具體的事？
    - bad: 你怎麼激勵你的團隊？
      why: 太廣、太抽象，答案永遠是老套的三個面向
      better: 你有沒有一個人，你找到了一個特別有效的方式讓他更有動力？那個方式是什麼？
    - bad: 你怎麼平衡人情和績效？
      why: 這個問題有「陷阱感」，受訪者會給政治正確的答案
      better: 你有沒有一個案例，你對一個人的情感和你對他的績效要求有明顯的張力？你當時怎麼做的？
    - bad: 你覺得你是一個好主管嗎？
      why: 自我評分無意義，且大多數人不敢說「不」
      better: 你有沒有一個前下屬，你現在回想起來覺得你沒有帶好他？是什麼情況？
    - bad: 你怎麼建立心理安全感？
      why: 問法太 buzzword，易引發理論性回答
      better: 你有沒有做過一件事，之後你發現你的人開始更敢說實話了？那件事是什麼？
    persona_anchor_examples:
    - 績效對話開場習慣先描述看到的具體行為，而不是用性格標籤描述對方的問題。
    - 授權標準是「可逆的決定放手，不可逆的決定介入」，而不是靠感覺判斷。
    - 評估人才時，最看重的是「在不確定情況下他怎麼思考」，而不是過往的成功經歷。
    - 對人員離職感到意外後，習慣回頭找早期三個月的訊號，用來改善下次的敏感度。
    - 文化塑造偏好靠自己公開承認失誤來建立心理安全感，而不是靠政策。
    - 能同時給努力的正面反饋和輸出不足的誠實反饋，不讓兩者互相覆蓋。
    - 向上溝通時習慣帶具體數據，說明決定對 delivery 能力的影響，而不是說「大家覺得不公平」。
    - 認為最難學會的管理技能是「不把自己的焦慮傳給團隊」。
    - 衝突介入的原則是先讓當事人自己解決，介入的觸發點是「問題開始影響到其他人」。
    - 好的 1-on-1 對他而言應以下屬的議題為主，主管的議題是例外而非預設。
    - 對「組織不讓說但自己覺得應該說」的資訊張力，有明確的處理哲學，不靠情緒決定。
    - 讚揚下屬時習慣說具體的行為和影響，而不是說「你做得很好」。
  creator_writer:
    name: Creator / Writer
    source: perplexity_max_domain_pack_v1
    domain_role:
    - 內容創作者、作家、自媒體、編輯、UGC 創作者、品牌內容策略師
    core_task:
    - 內容概念發想與企劃
    - 撰寫、剪輯、發布
    - 受眾研究與回饋整合
    - 個人品牌維護
    primary_counterparty:
    - 讀者/觀眾、編輯、品牌方
    decision_partner:
    - 合作夥伴、設計師、平台演算法（隱性）
    skill_questions:
    - id: creator_writer_skill_01
      title: 靈感來源與捕捉
      text: 你上一個讓你很興奮的題目是怎麼來的？你通常在什麼狀態下靈感最多？
      purpose: 萃取創作觸發機制——是主動尋找還是被動接收；是否有捕捉的系統
      expected_anchor: 「靈感來了不記就不見，我用 X（Notes/實體本）做靈感捕捉，每週看一次」
      follow_up_max: 1
      stop_condition: 取得具體的靈感來源模式
      risk_level: low
    - id: creator_writer_skill_02
      title: 創作流程結構
      text: 你從有一個題目到發布，通常要經過哪些步驟？有沒有哪個步驟你最常卡住？
      purpose: 萃取工作流程化程度——是否有穩定的流程，還是每次都不同
      expected_anchor: 「我的草稿到最終稿之間一定要放至少一天，冷了再看才能發現問題」
      follow_up_max: 1
      stop_condition: 取得創作流程的關鍵節點
      risk_level: low
    - id: creator_writer_skill_03
      title: 受眾反饋整合
      text: 你有沒有因為受眾的回饋改變了你的創作方式？還是你傾向不太被外部意見影響？
      purpose: 萃取受眾導向 vs. 創作自主的平衡點
      expected_anchor: 「留言告訴我沒懂，我會調整切入角度；但留言說他不喜歡，我不一定理他」
      follow_up_max: 1
      stop_condition: 取得受訪者的受眾整合策略
      risk_level: low
    - id: creator_writer_skill_04
      title: 品質標準
      text: 你有沒有一個你知道不夠好但還是發了的作品？你當時為什麼還是發？
      purpose: 萃取品質 vs. 發布節奏的取捨策略
      expected_anchor: 「發布的勇氣比完美主義更重要，但有一個不會妥協的底線」
      follow_up_max: 1
      stop_condition: 取得「可以接受的不完美」的標準
      risk_level: low
    - id: creator_writer_skill_05
      title: 創作低潮處理
      text: 你有沒有一段時間完全寫不出來，或做不出東西？你那段時間做了什麼？
      purpose: 萃取對創作枯竭的應對策略——是強迫、是休息、是換形式
      expected_anchor: 「那段時間我大量輸入，停止輸出壓力，等到有什麼東西要說的時候自然就回來了」
      follow_up_max: 2
      stop_condition: 取得低潮的應對策略
      risk_level: low
    - id: creator_writer_skill_06
      title: 商業創作 vs. 本心創作
      text: 你有沒有一個合作或案子，做完之後覺得不太是你想做的東西？你當時怎麼決定接？
      purpose: 萃取商業邊界——是否有清楚的「接案標準」
      expected_anchor: 「接了一個品牌案，但產品不是我真的推薦的，那是我接的最後一個那種案」
      follow_up_max: 1
      stop_condition: 取得接案的邊界條件
      risk_level: low
    - id: creator_writer_skill_07
      title: 跨平台策略
      text: 你在不同平台上的風格或主題一樣嗎？你怎麼決定什麼內容放在哪裡？
      purpose: 萃取受眾分眾意識與平台差異理解
      expected_anchor: 「長文放部落格，碎片化想法放短影片，但核心觀點不因平台改變」
      follow_up_max: 1
      stop_condition: 取得平台差異化策略
      risk_level: low
    - id: creator_writer_skill_08
      title: 個人品牌定位
      text: 你怎麼描述你的創作跟別人不一樣的地方？你最希望讀者/觀眾記住你的什麼？
      purpose: 萃取自我差異化意識——是否能清楚說出 POV
      expected_anchor: 「我希望大家記得的是：他說的事情我都能自己驗證，不是空話」
      follow_up_max: 1
      stop_condition: 取得自我定位敘事
      risk_level: low
    people_questions:
    - id: creator_writer_people_01
      title: 讀者/觀眾關係
      text: 有沒有一個讀者或觀眾，他的回應讓你改變了你做某件事的方式？是什麼事？
      signal: 受眾連結的深度；是否把觀眾視為對話夥伴還是輸出對象
    - id: creator_writer_people_02
      title: 合作者信任
      text: 你有沒有找人合作過一個內容項目，合作過程最不舒服的是什麼？
      signal: 合作邊界與溝通偏好
    - id: creator_writer_people_03
      title: 批評處理
      text: 你有沒有收過一個讓你不舒服的批評，但後來你承認他是對的？那個批評是什麼？
      signal: 接受批評的機制；是否能分辨「有用的批評」和「情緒攻擊」
    - id: creator_writer_people_04
      title: 品牌方關係
      text: 你跟品牌合作的時候，你最常需要重申的事情是什麼？
      signal: 創作自主性的維護策略
    - id: creator_writer_people_05
      title: 社群互動邊界
      text: 你怎麼管理自己跟社群之間的距離？有沒有你覺得太近或太遠的時候？
      signal: 公眾關係中的個人邊界感
    voice_roleplays:
    - id: creator_writer_voice_01
      title: 正式合作提案
      text: 一個品牌的 marketing 主管問你有沒有興趣合作，你需要先問清楚條件再決定要不要進一步談。請打一段回覆。
      extraction_target: 談判開場策略；是否主動定義合作條件
    - id: creator_writer_voice_02
      title: 拒絕不合適的合作
      text: 一個你不認同的品牌出了一個高於市場行情的報價。請打一封婉拒信。
      extraction_target: 拒絕方式；是否說出理由；語氣是否保持關係
    - id: creator_writer_voice_03
      title: 推進卡住的合作流程
      text: 你已交出內容初稿三週，品牌那邊一直說「在審核中」，你的發布計畫被卡住了。
      extraction_target: 催促策略；是否設定截止日期
    - id: creator_writer_voice_04
      title: 回應負面評論
      text: 你發了一篇文章，有人留言說「這個觀點根本就是錯的，你根本沒研究清楚」。
      extraction_target: 公開回應策略；是否能分辨內容批評和情緒攻擊
    - id: creator_writer_voice_05
      title: 創作延遲說明
      text: 你告訴訂閱者每週一篇，但這週因為個人狀況沒辦法發。請打一則公告。
      extraction_target: 對受眾的透明度；是否帶理由；是否帶下一步時間線
    boundaries_questions:
    - id: creator_writer_boundaries_01
      title: 創作主導權
      text: 品牌合作中，你有沒有一個絕對不讓步的點？是什麼？
      signal: 創作自主性的底線
    - id: creator_writer_boundaries_02
      title: 個人資訊邊界
      text: 你決定在創作裡分享多少自己的私人生活？這個邊界是怎麼劃的？
      signal: 公私邊界；是否有策略性地決定揭露範圍
    - id: creator_writer_boundaries_03
      title: 發布與生活平衡
      text: 你有沒有一段時間覺得創作的量讓你喘不過氣？你是怎麼重新找到節奏的？
      signal: 創作可持續性邊界；是否有節奏管理策略
    - id: creator_writer_boundaries_04
      title: 不接受的合作條件
      text: 有沒有一種合作要求，你直接說「這個我沒辦法接受」？那個要求是什麼？
      signal: 創作誠信邊界
    - id: creator_writer_boundaries_05
      title: 社群壓力邊界
      text: 你有沒有因為受眾的期待，做了一個你其實不想做的內容？後來怎麼樣？
      signal: 對受眾壓力的抵抗能力；是否能分辨「服務受眾」和「被受眾綁架」
    bad_questions:
    - bad: 你每個月有多少流量/追蹤數？
      why: 數字脫離脈絡，且易讓受訪者覺得被用數字評價
      better: 你做過一個你覺得沒爆但你自己很在乎的作品，那個作品對你的意義是什麼？
    - bad: 你怎麼保持創意？
      why: 太廣、易引出罐頭答案（「多出門多閱讀」）
      better: 你上一個最花心思的題目，從哪裡來的？
    - bad: 你有沒有 niche？
      why: 英文術語對部分受訪者有距離感，且易引出自我標籤
      better: 你覺得你的讀者來找你，最主要是因為你能給他們什麼？
    - bad: 你有沒有接過廣告？
      why: 暗示評判商業化，易引起防衛
      better: 你在商業合作和創作自由之間有沒有發生過衝突？那次是怎麼發生的？
    - bad: 你覺得你的寫作風格是什麼？
      why: 自我定義偏向表演，而非真實信號
      better: 有沒有一篇你覺得最接近你想說的話的文章？為什麼是那篇？
    persona_anchor_examples:
    - 靈感捕捉有固定系統，不依賴記憶，因為「靈感來了不記就不見」。
    - 草稿完成後一定放至少一天才發布，冷掉再看才能找到問題。
    - 受眾說「沒懂」會調整切入角度，但「不喜歡」不一定會改變。
    - 接案標準包含「這是我真的推薦的東西嗎」，不只看報酬。
    - 發布節奏比完美主義更重要，但對自己有一條不妥協的品質底線，能清楚說出那條線在哪。
    - 對創作低潮的應對是大量輸入、停止輸出壓力，而不是強迫自己產出。
    - 在不同平台上的核心觀點不因平台演算法改變，但形式和密度會調整。
    - 把「讀者能自己驗證我說的事」視為核心品牌承諾，而不是「讀者喜歡我」。
    - 公私邊界是策略性決定，而不是隨機透露——知道哪些事可以說、哪些事有代價。
    - 對負面評論能快速分辨「有建設性的批評」和「情緒攻擊」，並用不同方式應對。
    - 對社群壓力有清楚的底線——能說出一個他「不會因為受眾期待而做的事」。
    - 創作停滯期不視為失敗，視為必要的重新充電，且有具體的啟動儀式來結束停滯。
  teacher_coach:
    name: Teacher / Coach
    source: perplexity_max_domain_pack_v1
    domain_role:
    - 教師、培訓師、企業內訓師、教練（life/executive/career）、導師
    core_task:
    - 評估學習者狀態與需求
    - 設計與執行學習/coaching 路徑
    - 給予有效反饋
    - 支持自我突破與行為改變
    primary_counterparty:
    - 學生、學員、被 coaching 的人
    decision_partner:
    - 課程設計夥伴、共同督導、機構主管
    skill_questions:
    - id: teacher_coach_skill_01
      title: 診斷學習者狀態
      text: 你第一次跟一個新的學員或學生接觸，你怎麼評估他現在的狀態和他真正需要什麼？
      purpose: 萃取初步診斷方法——是問問題、觀察行為，還是靠測試
      expected_anchor: 「我會先問他最想解決的問題，再問他嘗試過什麼，這樣就能大概知道他在哪個階段」
      follow_up_max: 2
      stop_condition: 取得具體的評估流程
      risk_level: low
    - id: teacher_coach_skill_02
      title: 課程/路徑設計
      text: 你有沒有一個你很滿意的課程或 coaching 計畫設計？它和你之前的版本有什麼不同？
      purpose: 萃取設計邏輯——是以結果導向還是以內容導向
      expected_anchor: 「從「學了這個能做什麼」出發，而不是從「我想教什麼」出發」
      follow_up_max: 1
      stop_condition: 取得設計哲學
      risk_level: low
    - id: teacher_coach_skill_03
      title: 反饋給予風格
      text: 你給過一個讓學員不舒服但後來他感謝你的反饋，那個反饋說了什麼？
      purpose: 萃取直接反饋的能力與方式
      expected_anchor: 「我傾向先說我看到的行為，再說那個行為在外部的影響，最後問他自己怎麼看」
      follow_up_max: 2
      stop_condition: 取得具體的反饋結構
      risk_level: low
    - id: teacher_coach_skill_04
      title: 學習卡關的處理
      text: 你有沒有一個學員，他怎樣都跨不過某個關卡，你最後用什麼方式讓他突破的？
      purpose: 萃取卡關診斷——是能力問題、是信念問題，還是環境問題
      expected_anchor: 「通常卡關不是不會，而是有個他說不出口的擔心；我習慣先問他最壞的情況是什麼」
      follow_up_max: 2
      stop_condition: 取得具體的突破策略
      risk_level: low
    - id: teacher_coach_skill_05
      title: 對個別差異的適應
      text: 你怎麼調整你的教學或 coaching 方式，讓不同類型的人都能接受？有沒有一個你花最多力氣調整的例子？
      purpose: 萃取個人化程度——是否有意識地切換
      expected_anchor: 「行動型的人我直接給任務，分析型的人我先給框架，用的語言完全不同」
      follow_up_max: 1
      stop_condition: 取得至少兩種風格切換範例
      risk_level: low
    - id: teacher_coach_skill_06
      title: 成效評估
      text: 你怎麼知道你的教學或 coaching 有沒有效？你用什麼來判斷，而不只是靠感覺？
      purpose: 萃取成效評估的嚴謹度
      expected_anchor: 「每個 coaching 案例在開始前都要定義一個具體的行為指標，不然結束時很難評估」
      follow_up_max: 1
      stop_condition: 取得具體的評估方式
      risk_level: low
    - id: teacher_coach_skill_07
      title: 邊界衝突處理
      text: 你有沒有一個學員或被 coaching 的人，開始依賴你超出了正常的範圍？你怎麼處理？
      purpose: 萃取對「依賴」的應對策略——是否能在關懷和邊界間平衡
      expected_anchor: 「我的目標是讓他不需要我，如果他越來越需要我，代表我可能做錯了什麼」
      follow_up_max: 2
      stop_condition: 取得過度依賴的邊界應對
      risk_level: low
    - id: teacher_coach_skill_08
      title: 自我更新
      text: 你有沒有一個你以前教的東西，現在你的想法不一樣了？你怎麼更新自己的內容？
      purpose: 萃取知識更新意願——是否願意推翻舊有框架
      expected_anchor: 「如果我教的東西和我最新的實踐有落差，我寧可調整課程，不要讓它成為一套舊話術」
      follow_up_max: 1
      stop_condition: 取得自我更新的觸發機制
      risk_level: low
    people_questions:
    - id: teacher_coach_people_01
      title: 最深刻的學員
      text: 你教過或 coach 過的人裡面，有沒有一個讓你改變了你對某件事的看法？是什麼？
      signal: 是否能從學員身上學習；關係是否是單向的
    - id: teacher_coach_people_02
      title: 衝突與抵抗
      text: 你有沒有一個學員或學生，一直在抗拒你說的東西，但你覺得他才是對的那個？
      signal: 對「正確抵抗」的尊重；是否能放下教者身分
    - id: teacher_coach_people_03
      title: 學員失敗的責任感
      text: 你有沒有一個學員沒有達到他設定的目標，你覺得自己有責任嗎？那次你怎麼反思？
      signal: 責任感邊界；是否會過度承擔學員的失敗
    - id: teacher_coach_people_04
      title: 同儕督導
      text: 你有沒有一個你信任的人，你會把你的教學或 coaching 實踐拿給他看、讓他給你反饋？
      signal: 自我精進機制；是否有能力接受針對自己專業的批評
    - id: teacher_coach_people_05
      title: 學員成功的歸因
      text: 你帶過一個成果很好的學員，你覺得他的成功有多少是你的功勞？
      signal: 成就歸因——是過度謙虛還是過度邀功；是否能清楚說出自己的貢獻
    voice_roleplays:
    - id: teacher_coach_voice_01
      title: 正式學習啟動訊息
      text: 新的一對一 coaching 週期開始，你需要傳一封訊息給新學員，說明接下來的合作方式。
      extraction_target: 框架設定語氣；是否建立清楚的期待
    - id: teacher_coach_voice_02
      title: 拒絕不適合的委託
      text: 有人問你能不能幫他「改變他不想上學的孩子的態度」，但這不在你的專業範圍。
      extraction_target: 轉介建議方式；是否能誠實說明能力邊界而不傷對方的期待
    - id: teacher_coach_voice_03
      title: 推進停滯的 coaching 過程
      text: 你的學員已三週沒完成你們約定好的行動項目，但每次都說「最近太忙」。
      extraction_target: 面質策略；是否能在不批評的情況下讓對方正視模式
    - id: teacher_coach_voice_04
      title: 學員反彈你的觀點
      text: 你在 coaching 中說了一個觀點，學員說「我不同意，我覺得你說的不適用在我這裡」。
      extraction_target: 是否有能力接住反彈；是否能把抵抗轉成探索材料
    - id: teacher_coach_voice_05
      title: 結束 coaching 關係
      text: 你覺得你和某個學員已經到了這段 coaching 能給的極限，你需要告訴他這件事。
      extraction_target: 結束關係的語言；是否能帶著尊重說出「我們到了一個段落」
    boundaries_questions:
    - id: teacher_coach_boundaries_01
      title: 可教範圍邊界
      text: 有沒有一種學習需求，你會判斷這個人需要的不是我的 coaching，而是別的支持？你怎麼判斷？
      signal: 轉介能力；是否清楚自己的專業邊界（例如心理健康）
    - id: teacher_coach_boundaries_02
      title: 關係邊界
      text: 你和學員的關係，你怎麼讓它維持在「專業支持」而不是「私人情感依賴」？
      signal: 角色邊界的維持機制
    - id: teacher_coach_boundaries_03
      title: 不可接受的委託
      text: 有沒有一種培訓或 coaching 委託，你接了會讓你對自己不舒服？是什麼條件讓你說不？
      signal: 倫理邊界——例如不願意幫助「改造人」而不是「支持人成長」
    - id: teacher_coach_boundaries_04
      title: 個人成本邊界
      text: 教學或 coaching 很容易變成無限的情緒勞動，你有沒有一段時間覺得你付出超過了你能負荷的？你怎麼找回邊界？
      signal: 可持續工作的自我保護機制
    - id: teacher_coach_boundaries_05
      title: 成果承諾邊界
      text: 你在跟學員簽約或開始合作前，你通常怎麼設定對成果的期待？你有沒有一個你不會保證的事？
      signal: 成果責任的邊界——是否有「我負責過程，不負責結果」或其他明確的框架
    bad_questions:
    - bad: 你是什麼風格的老師/教練？
      why: 邀請自我貼標籤，答案永遠是「以人為本」
      better: 你教過的人，他們通常說你讓他們最有感的是什麼？
    - bad: 你覺得教學最重要的是什麼？
      why: 太哲學，答案是老套的「啟發學習者動機」
      better: 你做過一個決定，讓你的某個學員的學習開始不一樣，那個決定是什麼？
    - bad: 你怎麼對待不想學習的學生？
      why: 太籠統，且暗示「不想學習」是可以解決的
      better: 你有沒有一個學員，你後來判斷不管你做什麼，他現在就是沒準備好？你當時怎麼做的？
    - bad: 你有沒有執照或認證？
      why: 第一個問題就問資格，易讓受訪者感到被審查
      better: 你是什麼契機開始在這個領域教學/coaching 的？
    - bad: 你的學員成功率是多少？
      why: 沒有可比標準，且暗示 coaching 成敗由教練決定
      better: 你怎麼評估一段 coaching 關係的成功？你會用什麼訊號判斷？
    persona_anchor_examples:
    - 初次接觸新學員時習慣先問「最想解決的問題」和「嘗試過的方法」，用來快速定位學習階段。
    - 課程設計從「學了這個能做什麼」出發，而不是從「我想教什麼」出發。
    - 給反饋的結構是：先說看到的行為，再說外部影響，最後問學員自己怎麼看。
    - 認為學員卡關通常不是「不會」，而是有個說不出口的擔心——習慣用「最壞的情況是什麼」來開啟這個對話。
    - 對行動型學員直接給任務，對分析型學員先給框架，這兩種語言是完全不同的系統。
    - 每個 coaching 案在開始前定義一個具體的行為指標，而不是用「感覺有沒有進步」衡量。
    - 把「學員越來越不需要我」視為 coaching 成功的指標，而不是「學員越來越依賴我」。
    - 如果自己目前的實踐和教的內容有落差，會主動更新課程，不讓舊話術繼續流通。
    - 對學員的失敗有清楚的責任邊界——負責過程和工具，不對學員的最終選擇負全責。
    - 轉介能力是核心能力之一——能清楚說出「這個需求超出 coaching 的範疇，他需要的是 X」。
    - 在沒有委託的情況下不給建議，讓學員自己說出方向是 coaching 的核心方法。
    - 對「成果保證」有明確的語言邊界，不會說「我保證你一定能做到」，但能說「我承諾我的陪伴是全力以赴的」。
  founder_operator:
    name: Founder / Operator
    source: perplexity_max_domain_pack_v1
    domain_role:
    - 創辦人、共同創辦人、執行長、COO、早期員工
    core_task:
    - 策略制定與公司方向把舵
    - 資源（資金、人才）取得與分配
    - 產品/市場驗證
    - 組織建立與文化塑造
    - 危機管理與不確定性下的決策
    primary_counterparty:
    - 投資人、共同創辦人、早期員工、客戶
    decision_partner:
    - 共同創辦人、顧問、董事會、信任的外部人士
    skill_questions:
    - id: founder_operator_skill_01
      title: 核心決策框架
      text: 你有沒有做過一個決定，事後回看你覺得是你做過最正確的決定之一？你當時怎麼想到這樣做？
      purpose: 萃取決策邏輯的結構——是資料驅動、直覺信任，還是討論收斂
      expected_anchor: 「那個決定我做了兩週的小規模測試，沒等到完整數據就決定了，因為我覺得等下去機會就沒了」
      follow_up_max: 2
      stop_condition: 取得受訪者的決策觸發邏輯
      risk_level: low
    - id: founder_operator_skill_02
      title: 放棄某個方向
      text: 你有沒有放棄過一個你花了很多時間和資源的方向？那個決定是怎麼做出來的？
      purpose: 萃取 pivot / kill 決策的邏輯——是否能快速認錯；是否會因沉沒成本卡住
      expected_anchor: 「我有一個『如果這是我今天才看到的機會，我還會做嗎？』的自問，一旦答案是不，我就開始認真想放棄」
      follow_up_max: 2
      stop_condition: 取得放棄決策的觸發條件
      risk_level: medium
    - id: founder_operator_skill_03
      title: 資源極度有限下的優先序
      text: 你在資源最緊張的時候，你怎麼決定錢或人力放在哪裡？有沒有一個你覺得這個取捨很痛，但你知道你做對了？
      purpose: 萃取資源分配邏輯——是否有清楚的生存優先排序
      expected_anchor: 「那個時期我的原則是：活下去的事情優先，增長的事情有餘力才做」
      follow_up_max: 2
      stop_condition: 取得資源緊張時的優先序原則
      risk_level: low
    - id: founder_operator_skill_04
      title: 找人與選人
      text: 你找過一個你後來覺得選錯了的人，你當時為什麼選他？你從那次學到了什麼？
      purpose: 萃取人才判斷的自我修正——是否能說出具體的教訓
      expected_anchor: 「那次我選了一個亮眼履歷但沒有在 chaos 環境工作過的人，我沒確認他對模糊和變動的耐受度」
      follow_up_max: 2
      stop_condition: 取得選錯人的具體教訓
      risk_level: low
    - id: founder_operator_skill_05
      title: 危機應對模式
      text: 你有沒有遇過一個你覺得公司可能活不下去的時刻？那個時候你做了什麼，你自己的狀態是什麼？
      purpose: 萃取危機行為模式——是否能在極端壓力下保持清晰
      expected_anchor: 「那段時間我的原則是：先穩住自己，再穩住團隊，問題的解法是第三步」
      follow_up_max: 2
      stop_condition: 取得危機應對的行為模式
      risk_level: low
    - id: founder_operator_skill_06
      title: 投資人/董事會關係
      text: 你有沒有一次你的判斷和投資人的想法不一樣，你怎麼處理？
      purpose: 萃取獨立決策能力——是否能在資金壓力下維持自己的方向判斷
      expected_anchor: 「我把我的邏輯完整說清楚，讓投資人知道我考慮了什麼，再告訴他我的決定是什麼」
      follow_up_max: 1
      stop_condition: 取得與投資人的意見衝突處理策略
      risk_level: low
    - id: founder_operator_skill_07
      title: 文化塑造
      text: 你有沒有一件事，你做了之後，你的團隊開始出現一個你想要的行為模式？那件事是什麼？
      purpose: 萃取文化設計的具體手法
      expected_anchor: 「我開始在每週全員會議上分享自己犯的錯，後來大家都開始在自己的範疇這樣做」
      follow_up_max: 1
      stop_condition: 取得一個具體的文化行為設計範例
      risk_level: low
    - id: founder_operator_skill_08
      title: 創辦人孤獨感
      text: 創辦人很多決定沒辦法跟別人討論，你怎麼在這種狀態下保持判斷力清晰？
      purpose: 萃取孤獨決策下的自我管理策略
      expected_anchor: 「我有一個固定跟三到四個我信任的人的月會，他們不一定懂我的行業，但他們能幫我看清楚我自己的狀態」
      follow_up_max: 1
      stop_condition: 取得孤獨決策的應對方式
      risk_level: low
    people_questions:
    - id: founder_operator_people_01
      title: 共同創辦人關係
      text: 你和共同創辦人（或早期核心夥伴）有沒有過一次嚴重的意見衝突？那次是怎麼解的？
      signal: 最重要的合夥關係處理；是否有健康的衝突解法
    - id: founder_operator_people_02
      title: 放棄一個人
      text: 你有沒有讓一個很早就加入的人離開，那個決定你怎麼走到的？
      signal: 對創始團隊人員更替的處理；情感與組織需求的平衡
    - id: founder_operator_people_03
      title: 投資人信任
      text: 你怎麼判斷一個投資人是你想要的夥伴，而不只是想要他的錢？
      signal: 對資金以外的投資人價值的評估能力
    - id: founder_operator_people_04
      title: 員工離心
      text: 你有沒有感覺到某一段時間，你的團隊對公司方向失去信心？你怎麼察覺、又怎麼應對？
      signal: 組織信號敏感度；危機中的溝通策略
    - id: founder_operator_people_05
      title: 創辦人與員工的邊界
      text: 你和你的早期員工，邊界是清楚的嗎？你有沒有發現哪裡的邊界需要重新劃？
      signal: 角色與關係邊界的管理——創辦人很容易與早期員工建立過度的情感依賴
    voice_roleplays:
    - id: founder_operator_voice_01
      title: 全員重要訊息
      text: 公司剛做了一個策略轉向，方向和你三個月前說的不一樣。你需要向全員說明。
      extraction_target: 說清楚轉向理由的能力；是否帶信心感但不迴避矛盾
    - id: founder_operator_voice_02
      title: 拒絕投資條款
      text: 一個投資人給了你資金 offer，但其中一個條款你接受了會讓你的控制權受損。請打一封給投資人的信。
      extraction_target: 談判策略；是否能在拒絕條款的同時維持關係
    - id: founder_operator_voice_03
      title: 推進停滯中的合作
      text: 你一個關鍵合作夥伴（可能是通路/供應商/技術夥伴）最近回覆越來越慢，你需要讓這個關係重新活起來。
      extraction_target: 關係重啟策略；是否帶價值點
    - id: founder_operator_voice_04
      title: 公司危機內部溝通
      text: 公司剛失去一個大客戶，這件事會影響這個季度的數字。你需要在 30 分鐘後的全員會議說明這件事。
      extraction_target: 危機中的透明度與穩定感；是否能同時誠實和提振信心
    - id: founder_operator_voice_05
      title: 修復與共同創辦人的關係
      text: 你和共同創辦人上週有一次很激烈的爭論，你說了一些話你後來覺得超出了邊界。
      extraction_target: 創辦人夥伴修復語言；是否能承認而不失去領導感
    boundaries_questions:
    - id: founder_operator_boundaries_01
      title: 不可談判的創業底線
      text: 你有沒有一個條件，投資人或客戶提出來你直接說「不行，這個我不談」？那個條件是什麼？
      signal: 核心控制點認知；是否清楚自己的 non-negotiable
    - id: founder_operator_boundaries_02
      title: 創辦人個人邊界
      text: 創業之後，你有沒有某段時間覺得「我」消失了，只剩下「公司」？你怎麼重新找回？
      signal: 個人身份與公司身份的邊界；可持續性
    - id: founder_operator_boundaries_03
      title: 不接受的投資人行為
      text: 投資人有沒有做過什麼讓你覺得越界的事？那個越界是什麼？
      signal: 治理邊界；是否有能力在資金關係中維護決策主權
    - id: founder_operator_boundaries_04
      title: 放手授權邊界
      text: 你有沒有一件事，你交給別人做，但到最後還是你親自接手？你後來的判斷是：那次授權是失敗的，還是你的干預是多餘的？
      signal: 創辦人微管理傾向；授權能力與信任門檻
    - id: founder_operator_boundaries_05
      title: 公司存亡決策邊界
      text: 你有沒有想過，如果某件事發生了，你會選擇結束這家公司？那個條件是什麼？
      signal: 創辦人對「退出」的心理準備；是否能清楚說出放棄的邏輯而不只是情緒
    bad_questions:
    - bad: 你的公司現在估值是多少？
      why: 太直接、且可能 NDA 保護，易讓受訪者關閉
      better: 這個階段你最在意的一個指標是什麼，為什麼是那個？
    - bad: 你有沒有想過放棄？
      why: 太情緒化，且易引出英雄敘事式的假答案
      better: 你有沒有一個時刻，你認真評估過要轉向或停止某個方向？當時你怎麼決定繼續的？
    - bad: 你怎麼平衡工作和生活？
      why: 老套問題，答案通常是「其實沒辦法平衡」或是一個正向假裝
      better: 你有沒有一段時間覺得公司讓你消耗到了一個讓你不舒服的程度？你是怎麼注意到的？
    - bad: 你覺得你的競爭優勢是什麼？
      why: 易引發 pitch 模式而不是真實反思
      better: 你有沒有遇過一個客戶，他在你和競品之間選了你，你後來才知道真正的理由是什麼？
    - bad: 你的創業動機是什麼？
      why: 「創業動機」問題幾乎一定得到品牌化答案
      better: 在你決定做這件事之前，你有沒有一個讓你最猶豫的風險？是什麼讓你最後還是跨出去了？
    persona_anchor_examples:
    - 做決定時有一個「如果這是我今天才看到的機會，我還會做嗎？」的自問，一旦答案是「不」就開始認真考慮放棄。
    - 資源最緊張時的優先序原則是：先讓公司活下去，增長是有餘力才做的事。
    - 面對危機的行動順序是：先穩住自己，再穩住團隊，解決問題是第三步。
    - 和投資人意見不同時，習慣把自己的完整邏輯說清楚，再告訴對方自己的決定，而不是等對方核准。
    - 文化塑造偏好靠「公開承認自己的錯誤」來示範，而不是靠訂規定。
    - 有固定與 3-4 個信任者的月會，用來維持在孤獨決策中的判斷力清晰。
    - 對選錯人有具體的教訓敘事，能說出「下次會多問什麼問題」。
    - 認為共同創辦人關係需要像合夥契約一樣被維護，不因為熟就省略邊界對話。
    - 對「不接受的投資條款」有清楚的語言——能說出哪個條件是 dealbreaker 而不只是「感覺不對」。
    - 對公司和個人身份的邊界有意識，能說出一個具體的方式讓自己在創業高壓期還是保有「自己」的空間。
    - 在全員溝通策略轉向時，習慣直接說為什麼之前的方向是錯的，而不是用「進化」或「升級」等術語迴避。
    - 把「讓早期員工離開」視為最難但有時必要的決定，且能說出自己走到那個決定的邏輯。
